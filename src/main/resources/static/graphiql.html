<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <title>GraphiQL</title>
    <style>
        body { height: 100%; margin: 0; width: 100%; overflow: hidden; }
        #graphiql { height: 100vh; }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/graphiql@3.0.9/graphiql.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@graphiql/plugin-explorer@3.0.0/dist/style.css" />
</head>
<body>
<div id="graphiql">Loading...</div>

<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/graphiql@3.0.9/graphiql.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@graphiql/plugin-explorer@3.0.0/dist/index.umd.js"></script>

<script>
    const fetcher = GraphiQL.createFetcher({ url: '/graphql' });
    const explorerPlugin = GraphiQLPluginExplorer.explorerPlugin();

    ReactDOM.render(
        React.createElement(GraphiQL, {
            fetcher: fetcher,
            defaultEditorToolsVisibility: true,
            plugins: [explorerPlugin]
        }),
        document.getElementById('graphiql'),
    );
</script>
</body>
</html>
